services:
  - type: web
    name: fahrer-cloud-portal
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 2 -b 0.0.0.0:$PORT fahrer_cloud_portal:app
    healthCheckPath: /health
    envVars:
      - key: PORTAL_SECRET_KEY
        generateValue: true
      - key: ADMIN_API_TOKEN
        generateValue: true
      - key: PORTAL_DATA_DIR
        value: /var/data
    disk:
      name: fahrer-cloud-data
      mountPath: /var/data
      sizeGB: 1
